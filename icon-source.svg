<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1814"/>

  <!-- Mat / коврик -->
  <ellipse cx="256" cy="360" rx="155" ry="38" fill="#f5f0e8"/>
  <!-- Arrows on mat -->
  <g fill="#1a1814">
    <!-- left arrow -->
    <polygon points="108,358 130,344 130,372"/>
    <rect x="130" y="352" width="52" height="12" rx="4"/>
    <!-- right arrow -->
    <polygon points="404,358 382,344 382,372"/>
    <rect x="230" y="352" width="52" height="12" rx="4"/>
  </g>

  <!-- Body sitting cross-legged -->
  <!-- Torso -->
  <rect x="212" y="248" width="88" height="90" rx="28" fill="#f5f0e8"/>

  <!-- Head -->
  <circle cx="256" cy="205" r="42" fill="#f5f0e8"/>

  <!-- Left leg crossed -->
  <path d="M 218 320 Q 175 335 140 328 Q 120 322 118 310 Q 116 296 140 294 Q 170 292 210 305 Z" fill="#f5f0e8"/>
  <!-- Right leg crossed -->
  <path d="M 294 320 Q 337 335 372 328 Q 392 322 394 310 Q 396 296 372 294 Q 342 292 302 305 Z" fill="#f5f0e8"/>

  <!-- Left arm raised -->
  <path d="M 220 268 Q 185 240 158 195 Q 148 175 160 162 Q 172 150 188 162 Q 208 178 230 215 Q 240 238 228 260 Z" fill="#f5f0e8"/>
  <!-- Left hand fingers hint -->
  <ellipse cx="160" cy="155" rx="16" ry="20" fill="#f5f0e8"/>

  <!-- Right arm raised -->
  <path d="M 292 268 Q 327 240 354 195 Q 364 175 352 162 Q 340 150 324 162 Q 304 178 282 215 Q 272 238 284 260 Z" fill="#f5f0e8"/>
  <!-- Right hand -->
  <ellipse cx="352" cy="155" rx="16" ry="20" fill="#f5f0e8"/>
</svg>
