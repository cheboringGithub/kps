<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>КПС Курс · 30 дней</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1814">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="КПС Курс">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1814;
  --paper: #f5f0e8;
  --paper2: #ede8dd;
  --paper3: #e4ddd0;
  --rust: #b85c38;
  --rust-light: #d4724e;
  --sage: #5a7a5e;
  --sage-light: #7a9e7e;
  --gold: #c49a3c;
  --muted: #8a8278;
  --faint: #ccc6bb;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
}

/* Noise texture overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
}

/* ─── LAYOUT ─── */
.shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* ─── SIDEBAR ─── */
.sidebar {
  background: var(--ink);
  color: var(--paper);
  padding: 32px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.brand {
  padding: 0 28px 28px;
  border-bottom: 1px solid #2a2824;
}

.brand-tag {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--rust-light);
  margin-bottom: 8px;
}

.brand h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  line-height: 1.2;
  color: var(--paper);
}

.brand h1 em {
  font-style: italic;
  color: var(--rust-light);
}

.brand-sub {
  margin-top: 8px;
  font-size: 11px;
  color: #6a6560;
  line-height: 1.6;
}

/* Week nav */
.week-nav {
  padding: 20px 0;
  flex: 1;
}

.week-section {
  margin-bottom: 4px;
}

.week-label {
  padding: 8px 28px 4px;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #4a4540;
}

.day-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 28px;
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  transition: background 0.15s;
  font-family: 'DM Mono', monospace;
}

.day-btn:hover { background: #222; }

.day-btn.active { background: var(--rust); }

.day-num {
  font-size: 11px;
  color: #4a4540;
  min-width: 28px;
  font-weight: 500;
}

.day-btn.active .day-num { color: rgba(255,255,255,0.7); }

.day-title-short {
  font-size: 12px;
  color: #8a8278;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.day-btn.active .day-title-short { color: var(--paper); }

.day-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #2a2824;
  flex-shrink: 0;
  transition: background 0.15s;
}

.day-btn.done .day-dot { background: var(--sage); }
.day-btn.active .day-dot { background: rgba(255,255,255,0.4); }

/* Progress bar at bottom of sidebar */
.sidebar-progress {
  padding: 20px 28px;
  border-top: 1px solid #2a2824;
}

.prog-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #4a4540;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}

.prog-label span { color: var(--rust-light); }

.prog-track {
  height: 3px;
  background: #2a2824;
  border-radius: 2px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  background: var(--rust);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ─── MAIN CONTENT ─── */
.main {
  padding: 48px 56px 80px;
  max-width: 740px;
}

/* Day header */
.day-header {
  margin-bottom: 40px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--faint);
}

.day-meta {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 12px;
}

.day-big-num {
  font-family: 'DM Serif Display', serif;
  font-size: 72px;
  line-height: 1;
  color: var(--faint);
  letter-spacing: -4px;
}

.day-info {}

.day-date {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 4px;
}

.day-title-full {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  line-height: 1.2;
  color: var(--ink);
}

.day-title-full em {
  font-style: italic;
  color: var(--rust);
}

.day-focus {
  display: inline-flex;
  gap: 8px;
  align-items: center;
  background: var(--paper2);
  border: 1px solid var(--faint);
  padding: 6px 14px;
  font-size: 12px;
  color: var(--muted);
  margin-top: 12px;
}

.day-focus strong { color: var(--rust); }

.day-desc {
  margin-top: 14px;
  font-size: 13px;
  line-height: 1.8;
  color: var(--muted);
  max-width: 500px;
}

/* Timer total */
.time-strip {
  display: flex;
  gap: 20px;
  margin-bottom: 28px;
}

.time-chip {
  font-size: 11px;
  padding: 4px 12px;
  border: 1px solid var(--faint);
  color: var(--muted);
  display: flex;
  gap: 6px;
  align-items: center;
}

.time-chip strong { color: var(--ink); }

/* Exercise card */
.ex-card {
  border: 1px solid var(--faint);
  margin-bottom: 10px;
  background: #fff;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.ex-card:hover {
  border-color: var(--paper3);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.ex-card.kps-focus {
  border-left: 3px solid var(--rust);
}

.ex-card.secondary {
  border-left: 3px solid var(--sage);
}

.ex-head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}

.ex-idx {
  font-size: 10px;
  color: var(--faint);
  min-width: 20px;
  font-weight: 500;
}

.ex-name {
  flex: 1;
  font-size: 14px;
  color: var(--ink);
  font-weight: 500;
}

.ex-pills {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

.pill {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 0.04em;
}

.pill-time { background: var(--paper2); color: var(--muted); border: 1px solid var(--faint); }
.pill-kps { background: rgba(184,92,56,0.08); color: var(--rust); border: 1px solid rgba(184,92,56,0.2); }
.pill-fix { background: rgba(90,122,94,0.08); color: var(--sage); border: 1px solid rgba(90,122,94,0.2); }

.ex-chevron {
  font-size: 10px;
  color: var(--faint);
  transition: transform 0.2s;
  flex-shrink: 0;
}

.ex-card.open .ex-chevron { transform: rotate(180deg); }

.ex-body {
  display: none;
  padding: 0 18px 18px 52px;
  border-top: 1px solid var(--paper2);
}

.ex-card.open .ex-body { display: block; }

.ex-how {
  font-size: 12.5px;
  line-height: 1.85;
  color: #5a5450;
  margin-top: 14px;
}

.ex-how strong { color: var(--ink); font-weight: 500; }

.ex-note {
  margin-top: 12px;
  padding: 10px 14px;
  background: rgba(184,92,56,0.05);
  border-left: 2px solid var(--rust);
  font-size: 11.5px;
  color: var(--rust);
  line-height: 1.7;
}

/* Complete day button */
.complete-btn {
  margin-top: 32px;
  padding: 14px 32px;
  background: var(--ink);
  color: var(--paper);
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.complete-btn:hover { background: var(--rust); }
.complete-btn.done-state { background: var(--sage); }

/* Phase banner */
.phase-banner {
  padding: 16px 20px;
  margin-bottom: 28px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  background: var(--paper2);
  border: 1px solid var(--faint);
}

.phase-icon {
  font-size: 24px;
  flex-shrink: 0;
  margin-top: 2px;
}

.phase-text {}

.phase-name {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--rust);
  margin-bottom: 4px;
}

.phase-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.7;
}

/* ── TIMER ── */
.timer-block {
  margin-top: 16px;
  background: var(--paper2);
  border: 1px solid var(--faint);
  padding: 16px;
}

.timer-phase-label {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 500;
}
.timer-phase-label.work-phase { color: var(--rust); }
.timer-phase-label.rest-phase { color: var(--sage); }
.timer-phase-label.done-phase { color: var(--muted); }

.timer-instruction {
  font-size: 14px;
  color: var(--ink);
  font-weight: 500;
  margin-bottom: 12px;
  min-height: 20px;
  line-height: 1.4;
}

.timer-display {
  font-family: 'DM Serif Display', serif;
  font-size: 56px;
  line-height: 1;
  letter-spacing: -2px;
  color: var(--ink);
  margin-bottom: 10px;
  transition: color 0.3s;
}
.timer-display.rest-color { color: var(--sage); }
.timer-display.low-color { color: var(--rust); }

.timer-track {
  height: 4px;
  background: var(--faint);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 14px;
}
.timer-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s linear, background 0.3s;
  background: var(--rust);
}
.timer-fill.rest-fill { background: var(--sage); }

.timer-meta {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex;
  gap: 14px;
}

.timer-controls {
  display: flex;
  gap: 8px;
}

.timer-btn {
  padding: 9px 20px;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 0.15s;
}
.timer-btn-play {
  background: var(--ink);
  color: var(--paper);
}
.timer-btn-play:hover { background: var(--rust); }
.timer-btn-reset {
  background: var(--faint);
  color: var(--muted);
}
.timer-btn-reset:hover { background: var(--paper3); color: var(--ink); }

  .shell { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main { padding: 28px 20px 60px; }
  .day-big-num { font-size: 48px; }
  .ex-body { padding-left: 18px; }
  .ex-pills { flex-direction: column; align-items: flex-end; gap: 3px; }
}
</style>
</head>
<body>
<div class="shell">

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-tag">Курс · 30 дней</div>
      <h1>КПС &<br><em>Подвижность</em></h1>
      <p class="brand-sub">Старт: пятница, 29 мая<br>Только ноги и таз · ~30 мин/день</p>
    </div>
    <nav class="week-nav" id="weekNav"></nav>
    <div class="sidebar-progress">
      <div class="prog-label">Прогресс <span id="progText">0 / 30</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <!-- Injected by JS -->
  </main>

</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const PHASES = {
  1: {
    name: "Фаза 1 · Недели 1–2",
    title: "Декомпрессия и первый контакт с КПС",
    icon: "○",
    desc: "Снимаем острое напряжение с крестцово-подвздошного сустава. Никакой нагрузки оси позвоночника. Тело учится чувствовать разницу между зажатым и свободным КПС."
  },
  2: {
    name: "Фаза 2 · Недели 3–4",
    title: "Подвздошно-поясничная и активация ягодичных",
    icon: "◐",
    desc: "Работаем с главным виновником сжатия КПС — подвздошно-поясничной мышцей. Параллельно просыпается средняя ягодичная — стабилизатор таза. Начинаем видеть разницу между сторонами."
  },
  3: {
    name: "Фаза 3 · Недели 5–6",
    title: "Коррекция перекоса и боковая цепь",
    icon: "◕",
    desc: "Таз начинает выравниваться. Прицельно работаем с асимметрией. ТН-фасция и боковая цепь — ключ к разгрузке левого колена. Ладони приближаются к полу."
  },
  4: {
    name: "Фаза 4 · Недели 7–8",
    title: "Интеграция и полный диапазон",
    icon: "●",
    desc: "Закрепляем нейтральный таз. КПС стабилен и свободен. Ладони на полу — как естественное следствие. Переходим на поддерживающий режим."
  }
};

// Exercise library
const EX = {
  // ── КПС core ──
  kps_decomp: {
    name: "Декомпрессия КПС — колени к груди",
    time: "4 мин", type: "kps",
    // sets: [{label, work_sec, rest_sec}] — repeated `rounds` times
    timer: { rounds: 4, work: 20, rest: 10, workLabel: "Держи — дыши в поясницу", restLabel: "Расслабь ноги на пол" },
    how: `<strong>Исходное положение:</strong> лёжа на спине, колени согнуты, стопы на полу.<br>
① Подтяни ОБА колена к груди, обхвати руками за голени. Поясница отрывается, КПС мягко открывается. Держи 20 сек, дыши в поясницу.<br>
② Медленно покачай коленями влево-вправо — 3–4 см, 8 покачиваний. Чуть дальше влево — там зажато сильнее.<br>
③ Отпусти ноги на пол, пауза 10 сек — почувствуй разницу.<br>
<strong>Повторы:</strong> 4 цикла.`,
    note: "Это главное упражнение курса. Суставная щель КПС физически увеличивается. Многие чувствуют облегчение в пояснице с первого раза."
  },
  kps_clock: {
    name: "Pelvic Clock — нейтраль таза",
    time: "3 мин", type: "kps",
    timer: { rounds: 3, work: 40, rest: 10, workLabel: "Двигай таз — медленно", restLabel: "Пауза" },
    how: `<strong>Исходное положение:</strong> лёжа на спине, колени согнуты, стопы на ширине таза.<br>
Представь циферблат на тазу: 12 — пупок, 6 — копчик, 3 — правое бедро, 9 — левое.<br>
① 12↔6: наклоняй таз вперёд-назад, 10 раз. Движение 1–2 см, без усилия.<br>
② 3↔9: правое бедро вниз — левое вниз, 10 раз. Задержка в положении «9 часов» (правое бедро ниже, левое приподнято) на 3 сек — это вытягивает сжатый левый КПС вверх к нейтрали.<br>
③ Медленный полный круг: 12 → 9 → 6 → 3 → 12. Пять кругов, в «9 часах» — чуть медленнее.`,
    note: "Левый КПС опущен — положение «9 часов» (правое бедро ниже) поднимает левую сторону таза к нейтрали. Именно там задержка."
  },
  kps_traction: {
    name: "Тракция КПС — поочерёдные колени",
    time: "4 мин", type: "kps",
    timer: { rounds: 4, sets: [{work:30, rest:5, workLabel:"ЛЕВОЕ колено к груди", restLabel:"Смена"},{work:20, rest:10, workLabel:"ПРАВОЕ колено к груди", restLabel:"Пауза между циклами"}] },
    how: `<strong>Исходное положение:</strong> лёжа на спине, колени согнуты.<br>
Подтяни ЛЕВОЕ колено к груди обеими руками — правая нога скользит прямо по полу. Держи 30 сек: левый КПС сжат сильнее — именно он раскрывается сейчас.<br>
Смени: ПРАВОЕ колено к груди, левая нога прямая. Держи 20 сек.<br>
<strong>Повторы:</strong> 4 цикла. Начинай всегда с ЛЕВОЙ — левый КПС сжат, опущен, ему нужно больше тракции.`,
    note: "Левый КПС — основная проблема: он сжат и опущен (левая седалищная кость давит сильнее при сидении). Левая сторона всегда получает больше тракции."
  },
  kps_90_90: {
    name: "90/90 — мобилизация КПС сидя",
    time: "4 мин", type: "kps",
    timer: { rounds: 3, sets: [{work:50, rest:5, workLabel:"ЛЕВОЕ колено вперёд", restLabel:"Смена"},{work:35, rest:15, workLabel:"ПРАВОЕ колено вперёд", restLabel:"Пауза между циклами"}] },
    how: `<strong>Исходное положение:</strong> сидя на полу. ЛЕВОЕ колено согнуто перед тобой (голень параллельна телу), правое — сбоку (голень уходит назад). Оба угла — 90°.<br>
Сиди вертикально, руки упираются в пол для баланса. Держи 50 сек — левый КПС в наружной ротации, именно там зажим.<br>
Смени стороны: правое колено вперёд, левое назад. Держи 35 сек.<br>
<strong>Повторы:</strong> 3 раза. ЛЕВОЕ колено вперёд — всегда приоритет и дольше.`,
    note: "Левое колено вперёд = наружная ротация левого тазобедренного = прямое раскрытие сжатого левого КПС."
  },
  kps_bridge: {
    name: "Мост с фокусом на КПС",
    time: "4 мин", type: "kps",
    timer: { rounds: 8, work: 8, rest: 5, workLabel: "Вверх медленно — держи 5 сек", restLabel: "Расслабь ягодицы полностью" },
    how: `<strong>Исходное положение:</strong> лёжа на спине, колени согнуты, стопы на ширине таза.<br>
Медленно поднимай таз — позвонок за позвонком снизу вверх. На пике: стой 5 сек, затем очень медленно опускай сверху вниз — снова позвонок за позвонком.<br>
<strong>Ключевое:</strong> в нижней точке — полностью расслабь ягодицы и поясницу. КПС декомпрессируется в момент расслабления.<br>
<strong>Повторы:</strong> 8 медленных повторов. Темп: 3 сек вверх — 5 сек вниз.`,
    note: null
  },

  // ── Подвздошно-поясничная ──
  il_lunge: {
    name: "Глубокий выпад — подвздошно-поясничная",

let currentDay = 1;
const done = new Set(JSON.parse(localStorage.getItem('kps_done') || '[]'));

  localStorage.setItem('kps_done', JSON.stringify([...done]));
}

function buildNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  let currentPhase = null;
  DAYS.forEach((day, i) => {
    const d = i + 1;
    if (day.phase !== currentPhase) {
      currentPhase = day.phase;
      const ws = document.createElement('div');
      ws.className = 'week-section';
      const wl = document.createElement('div');
      wl.className = 'week-label';
      wl.textContent = PHASES[day.phase].name;
      ws.appendChild(wl);
      nav.appendChild(ws);
    }
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === currentDay ? ' active' : '') + (done.has(d) ? ' done' : '');
    btn.innerHTML = `<span class="day-num">д${d}</span><span class="day-title-short">${day.short}</span><span class="day-dot"></span>`;
    btn.onclick = () => showDay(d);
    nav.querySelector('.week-section:last-child').appendChild(btn);
  });
}

// ─── TIMER ENGINE ────────────────────────────────────────────────────────────
const timerState = {}; // key: `${day}-${exIdx}`

function timerKey(d, i) { return `${d}-${i}`; }

function buildSequence(timer) {
  // Returns flat array of {work, rest, workLabel, restLabel} per round
  const seq = [];
  for (let r = 0; r < timer.rounds; r++) {
    if (timer.sets) {
      timer.sets.forEach(s => seq.push({ ...s, round: r + 1 }));
    } else {
      seq.push({ work: timer.work, rest: timer.rest, workLabel: timer.workLabel, restLabel: timer.restLabel, round: r + 1 });
    }
  }
  return seq;
}

function timerToggle(exKey, d, i) {
  const k = timerKey(d, i);
  const ex = EX[exKey];
  if (!ex || !ex.timer) return;

  if (!timerState[k]) {
    // Init
    timerState[k] = {
      seq: buildSequence(ex.timer),
      seqIdx: 0,
      phase: 'work',
      remaining: 0,
      interval: null,
      paused: false,
      exKey, d, i,
      totalRounds: ex.timer.rounds
    };
    const s = timerState[k];
    s.remaining = s.seq[0].work;
    requestWakeLock();
    timerTick(k);
    return;
  }

  const s = timerState[k];
  if (s.done) { timerReset(exKey, d, i); return; }

  if (s.interval) {
    // Pause
    clearInterval(s.interval);
    s.interval = null;
    s.paused = true;
    document.getElementById(`tmr-play-${d}-${i}`).textContent = '▶ Продолжить';
  } else {
    // Resume
    s.paused = false;
    timerTick(k);
  }
}

function timerTick(k) {
  const s = timerState[k];
  const { d, i } = s;
  renderTimerUI(k);

  s.interval = setInterval(() => {
    s.remaining--;
    if (s.remaining <= 0) {
      // Phase done
      clearInterval(s.interval);
      s.interval = null;
      const cur = s.seq[s.seqIdx];

      if (s.phase === 'work') {
        const restSec = cur.rest || 0;
        if (restSec > 0) {
          playBeep('rest');
          s.phase = 'rest';
          s.remaining = restSec;
          renderTimerUI(k);
          timerTick(k);
        } else {
          // No rest — go to next set
          advanceSeq(k);
        }
      } else {
        // Rest done
        playBeep('work');
        advanceSeq(k);
      }
    } else {
      if (s.remaining === 3) playBeep('countdown');
      renderTimerUI(k);
    }
  }, 1000);
}

function advanceSeq(k) {
  const s = timerState[k];
  s.seqIdx++;
  if (s.seqIdx >= s.seq.length) {
    // All done
    s.done = true;
    playBeep('done');
    const anyActive = Object.values(timerState).some(st => st.interval && !st.done);
    if (!anyActive) releaseWakeLock();
    renderTimerUI(k);
    return;
  }
  s.phase = 'work';
  s.remaining = s.seq[s.seqIdx].work;
  renderTimerUI(k);
  timerTick(k);
}

function renderTimerUI(k) {
  const s = timerState[k];
  const { d, i } = s;
  if (!document.getElementById(`tmr-disp-${d}-${i}`)) return;

  if (s.done) {
    document.getElementById(`tmr-phase-${d}-${i}`).textContent = 'Готово!';
    document.getElementById(`tmr-phase-${d}-${i}`).className = 'timer-phase-label done-phase';
    document.getElementById(`tmr-instr-${d}-${i}`).textContent = '✓ Упражнение выполнено';
    document.getElementById(`tmr-disp-${d}-${i}`).textContent = '✓';
    document.getElementById(`tmr-fill-${d}-${i}`).style.width = '100%';
    document.getElementById(`tmr-fill-${d}-${i}`).className = 'timer-fill';
    document.getElementById(`tmr-play-${d}-${i}`).textContent = '↺ Ещё раз';
    document.getElementById(`tmr-meta-${d}-${i}`).textContent = 'Упражнение завершено';
    return;
  }

  const cur = s.seq[s.seqIdx];
  const isWork = s.phase === 'work';
  const total = isWork ? cur.work : (cur.rest || 1);
  const pct = Math.max(0, (s.remaining / total) * 100);
  const mins = Math.floor(s.remaining / 60);
  const secs = s.remaining % 60;
  const timeStr = mins > 0 ? `${mins}:${String(secs).padStart(2,'0')}` : `${secs}`;

  const phaseEl = document.getElementById(`tmr-phase-${d}-${i}`);
  phaseEl.textContent = isWork ? 'РАБОТА' : 'ОТДЫХ';
  phaseEl.className = `timer-phase-label ${isWork ? 'work-phase' : 'rest-phase'}`;

  document.getElementById(`tmr-instr-${d}-${i}`).textContent = isWork ? cur.workLabel : cur.restLabel;

  const dispEl = document.getElementById(`tmr-disp-${d}-${i}`);
  dispEl.textContent = timeStr;
  dispEl.className = `timer-display${!isWork ? ' rest-color' : s.remaining <= 3 ? ' low-color' : ''}`;

  const fillEl = document.getElementById(`tmr-fill-${d}-${i}`);
  fillEl.style.width = pct + '%';
  fillEl.className = `timer-fill${!isWork ? ' rest-fill' : ''}`;

  const roundNum = cur.round || (Math.floor(s.seqIdx / (s.seq.length / s.totalRounds)) + 1);
  const setInRound = s.seqIdx + 1;
  document.getElementById(`tmr-meta-${d}-${i}`).textContent =
    `Раунд ${cur.round || '—'} / ${s.totalRounds} · Подход ${setInRound} из ${s.seq.length}`;

  document.getElementById(`tmr-play-${d}-${i}`).textContent = s.interval ? '⏸ Пауза' : '▶ Продолжить';
}

function timerReset(exKey, d, i) {
  const k = timerKey(d, i);
  if (timerState[k]?.interval) clearInterval(timerState[k].interval);
  delete timerState[k];

  const phaseEl = document.getElementById(`tmr-phase-${d}-${i}`);
  if (!phaseEl) return;
  phaseEl.textContent = 'Готов к старту';
  phaseEl.className = 'timer-phase-label work-phase';
  document.getElementById(`tmr-instr-${d}-${i}`).textContent = 'Нажми Play для начала';
  document.getElementById(`tmr-disp-${d}-${i}`).textContent = '—';
  document.getElementById(`tmr-disp-${d}-${i}`).className = 'timer-display';
  document.getElementById(`tmr-fill-${d}-${i}`).style.width = '100%';
  document.getElementById(`tmr-fill-${d}-${i}`).className = 'timer-fill';
  document.getElementById(`tmr-meta-${d}-${i}`).textContent = `Раунд 0 / ${EX[exKey]?.timer?.rounds || '?'} · Подход 0`;
  document.getElementById(`tmr-play-${d}-${i}`).textContent = '▶ Старт';
}

// ─── WAKE LOCK ───────────────────────────────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}

function releaseWakeLock() {
  if (wakeLock) {
    wakeLock.release();
    wakeLock = null;
  }
}

// Re-acquire if page becomes visible again (e.g. user switches tabs and back)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    const anyActive = Object.values(timerState).some(s => s.interval && !s.done);
    if (anyActive) requestWakeLock();
  }
});

// ─── AUDIO ───────────────────────────────────────────────────────────────────
// Audio beeps via Web Audio API
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep(type) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (type === 'work') { osc.frequency.value = 880; gain.gain.value = 0.3; osc.start(); osc.stop(ctx.currentTime + 0.15); setTimeout(() => { const o2 = ctx.createOscillator(); const g2 = ctx.createGain(); o2.connect(g2); g2.connect(ctx.destination); o2.frequency.value = 1100; g2.gain.value = 0.3; o2.start(); o2.stop(ctx.currentTime + 0.2); }, 180); }
    else if (type === 'rest') { osc.frequency.value = 440; gain.gain.value = 0.2; osc.start(); osc.stop(ctx.currentTime + 0.3); }
    else if (type === 'countdown') { osc.frequency.value = 660; gain.gain.value = 0.15; osc.start(); osc.stop(ctx.currentTime + 0.08); }
    else if (type === 'done') { [880,1100,1320].forEach((f,j) => { setTimeout(() => { const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=f; g.gain.value=0.25; o.start(); o.stop(ctx.currentTime+0.2); }, j*220); }); }
  } catch(e) {}
}

function showDay(d) {
  currentDay = d;
  buildNav();
  buildMain(d);
  updateProgress();
  document.getElementById('mainContent').scrollTop = 0;
  window.scrollTo(0, 0);
}

function toggleEx(id) {
  document.getElementById(id).classList.toggle('open');
}

function toggleDone(d) {
  if (done.has(d)) {
    done.delete(d);
  } else {
    done.add(d);
  }
  saveState();
  buildNav();
  buildMain(d);
  updateProgress();
}

function updateProgress() {
  const pct = Math.round(done.size / 30 * 100);
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progText').textContent = `${done.size} / 30`;
}

// ─── SERVICE WORKER ──────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/kps/sw.js', { scope: '/kps/' }).catch(() => {});
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
buildNav();
buildMain(currentDay);
updateProgress();
</script>
